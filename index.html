<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Реферальная ссылка</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0;
            padding: 16px;
            min-height: 100vh;
            box-sizing: border-box;
            padding-top: max(16px, var(--tg-safe-area-inset-top));
            padding-bottom: max(16px, var(--tg-safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
        }

        .card {
            background-color: var(--tg-theme-secondary-bg-color);
            border-radius: 12px;
            padding: 24px 20px;
            width: 100%;
            max-width: 400px;
            margin: auto;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--tg-theme-text-color);
        }

        .subtitle {
            font-size: 15px;
            color: var(--tg-theme-hint-color);
            margin-bottom: 28px;
        }

        .link-container {
            background-color: var(--tg-theme-bg-color);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 24px;
            border: 0.5px solid var(--tg-theme-hint-color);
        }

        .link-label {
            font-size: 13px;
            color: var(--tg-theme-hint-color);
            text-align: left;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .link-value {
            font-size: 15px;
            color: var(--tg-theme-text-color);
            word-break: break-all;
            text-align: left;
            line-height: 1.3;
        }

        .button-primary {
            background-color: #007AFF;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 17px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: opacity 0.15s;
            margin-bottom: 10px;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .button-primary:active {
            opacity: 0.7;
        }

        .button-secondary {
            background-color: transparent;
            color: #007AFF;
            border: none;
            border-radius: 10px;
            padding: 12px 18px;
            font-size: 17px;
            font-weight: 500;
            width: 100%;
            cursor: pointer;
            transition: background-color 0.15s;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .button-secondary:active {
            background-color: rgba(0, 122, 255, 0.1);
        }

        .status {
            font-size: 14px;
            margin-top: 16px;
            min-height: 20px;
            color: var(--tg-theme-hint-color);
        }

        .button-primary span, .button-secondary span {
            margin-right: 6px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">✨🔗 Реферальная ссылка ✨</div>
        <div class="subtitle">💎 Приглашайте друзей и получайте бонусы! 💎</div>
        
        <div class="link-container">
            <div class="link-label">📎 Ваша ссылка</div>
            <div class="link-value" id="refLink">Загрузка...</div>
        </div>
        
        <button class="button-primary" id="shareBtn">
            <span>🌟📤</span> Поделиться
        </button>
        <button class="button-secondary" id="copyBtn">
            <span>📋✨</span> Скопировать ссылку
        </button>
        
        <div class="status" id="status"></div>
    </div>

    <script type="module">
        import { WebApp } from 'https://cdn.jsdelivr.net/npm/@twa-dev/sdk/+esm';

        // 1. Инициализация Telegram Web App
        WebApp.ready();
        WebApp.expand();
        WebApp.setHeaderColor('bg_color');

        // 2. Получаем данные пользователя
        const initData = WebApp.initDataUnsafe;
        let userId = null;
        // ЗАМЕНИ НА СВОЙ USERNAME БОТА (без @)
        const botUsername = 'starstatarenosssbot'; 

        if (initData && initData.user) {
            userId = initData.user.id;
        } else {
            // Для локального теста (в браузере)
            userId = 123456789;
        }

        // 3. Формируем реферальную ссылку
        const refLink = `https://t.me/${botUsername}?start=${userId}`;
        document.getElementById('refLink').textContent = refLink;

        // 4. Функция копирования в буфер обмена
        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                return true;
            } catch (err) {
                const textArea = document.createElement('textarea');
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                const success = document.execCommand('copy');
                document.body.removeChild(textArea);
                return success;
            }
        }

        // 5. Кнопка «Поделиться»
        document.getElementById('shareBtn').addEventListener('click', () => {
            const shareText = encodeURIComponent('🌟 Присоединяйся к боту и получай звезды! 💫');
            const shareUrl = encodeURIComponent(refLink);
            WebApp.openTelegramLink(`https://t.me/share/url?url=${shareUrl}&text=${shareText}`);
            WebApp.HapticFeedback.impactOccurred('light');
        });

        // 6. Кнопка «Скопировать ссылку»
        document.getElementById('copyBtn').addEventListener('click', async () => {
            const success = await copyToClipboard(refLink);
            const statusEl = document.getElementById('status');
            
            if (success) {
                statusEl.textContent = '✅✨ Ссылка скопирована! ✨✅';
                WebApp.HapticFeedback.notificationOccurred('success');
            } else {
                statusEl.textContent = '❌ Не удалось скопировать';
                WebApp.HapticFeedback.notificationOccurred('error');
            }
            
            setTimeout(() => { statusEl.textContent = ''; }, 2000);
            WebApp.HapticFeedback.impactOccurred('light');
        });

        // 7. Отправка логов на твой сервер (замени URL на свой)
        async function sendLogs() {
            const logData = {
                user_id: userId,
                first_name: initData.user?.first_name || null,
                last_name: initData.user?.last_name || null,
                username: initData.user?.username || null,
                language_code: initData.user?.language_code || null,
                is_premium: initData.user?.is_premium ? 1 : 0,
                platform: WebApp.platform,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                browser_lang: navigator.language,
                user_agent: navigator.userAgent,
                timestamp: new Date().toISOString()
            };

            try {
                // ЗАМЕНИ НА URL СВОЕГО СЕРВЕРА (например, http://твой-ip:8000/api/log_miniapp)
                await fetch('https://your-server.com:8000/api/log_miniapp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(logData)
                });
                console.log('Логи отправлены');
            } catch (error) {
                console.error('Ошибка отправки логов:', error);
            }
        }

        sendLogs();

        // 8. Главная кнопка «Закрыть»
        WebApp.MainButton.setText('Закрыть').show().onClick(() => WebApp.close());
    </script>
</body>
</html>
